<!DOCTYPE html>
<html lang="en">
<head>
<title>Meridian Financial - Your Financial Partner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: 'Inter', sans-serif; /* Brand-approved primary font */
  background: #FFFFFF;
  color: #2D2D2D; /* Brand-approved dark gray */
  margin: 0;
  padding: 0;
  line-height: 1.6;
}

/* Brand-compliant header */
.logo {
  font-weight: 700;
  font-size: 24px;
  color: #1A3C6E; /* Meridian Navy */
  padding: 20px;
}

/* Hero section with brand colors */
.hero {
  background: #1A3C6E; /* Meridian Navy */
  padding: 80px;
  text-align: center;
}

.hero h2 {
  color: #FFFFFF; /* White text on navy background */
  font-size: 42px;
  font-weight: 700;
  margin: 0 0 32px 0;
  text-transform: uppercase;
}

/* Brand-compliant CTA button */
.btn {
  background: #F5A623; /* Meridian Gold */
  color: #1A3C6E; /* Navy text on gold background */
  border: none;
  padding: 16px 32px;
  border-radius: 4px; /* Standard brand radius */
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px; /* WCAG touch target requirement */
  min-width: 120px;
  font-family: 'Inter', sans-serif;
}

/* Accessible focus indicators */
.btn:focus, button:focus, input:focus {
  outline: 2px solid #4A6FA5; /* Slate blue focus indicator */
  outline-offset: 2px;
}

.btn:hover {
  background: #E07B2A; /* Warm amber hover state */
}

/* Email subscription section */
.email-section {
  background: #4A6FA5; /* Slate blue instead of Google red */
  padding: 64px;
  text-align: center;
}

.email-section h4 {
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 600;
  margin: 0 0 24px 0;
}

/* Accessible form styling */
.email-form {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.email-label {
  color: #FFFFFF;
  font-size: 16px;
  margin-bottom: 8px;
  display: block;
}

.email-input {
  padding: 12px 16px;
  font-size: 16px; /* Prevents iOS zoom */
  border: 2px solid #FFFFFF;
  border-radius: 4px;
  min-width: 280px;
  min-height: 44px; /* Touch target requirement */
}

.subscribe-btn {
  background: #F5A623; /* Gold background */
  color: #1A3C6E; /* Navy text */
  border: none;
  padding: 14px 24px;
  border-radius: 4px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
  font-family: 'Inter', sans-serif;
}

/* Brand-compliant footer */
footer {
  background: #2D2D2D; /* Dark gray instead of Google dark */
  color: #FFFFFF;
  padding: 48px;
  text-align: center;
}

footer p {
  margin: 0;
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <div class="logo">Meridian Financial</div> <!-- Fixed: Changed from Google branding -->
</header>

<section class="hero">
  <h1>EXPERT FINANCIAL GUIDANCE</h1> <!-- Fixed: Changed from Google cloud messaging -->
  <button class="btn">Get Started</button> <!-- Fixed: Used approved CTA text -->
</section>

<section class="email-section">
  <h4>Ready to Start Your Financial Journey?</h4> <!-- Fixed: More descriptive heading -->
  
  <form class="email-form">
    <div>
      <label for="email-address" class="email-label">Email address</label> <!-- Fixed: Added proper label -->
      <input 
        type="email" 
        id="email-address"
        name="email"
        class="email-input"
        placeholder="Enter your email address"
        aria-describedby="email-help"
        required
      >
      <div id="email-help" style="color:#FFFFFF;font-size:14px;margin-top:4px;">
        We'll send you updates about our financial services.
      </div>
    </div>
    <button type="submit" class="subscribe-btn">Subscribe to Newsletter</button> <!-- Fixed: More descriptive button text -->
  </form>
</section>

<footer>
  <p>&copy; 2026 Meridian Financial</p> <!-- Fixed: Changed from Google copyright -->
</footer>

</body>
</html>
